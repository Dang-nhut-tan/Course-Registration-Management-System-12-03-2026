<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet">

<!-- CSS đăng nhập -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<title>Đăng nhập hệ thống</title>
</head>

<body class="bg-background-light min-h-screen flex flex-col font-display">

<header class="w-full bg-white border-b">
<div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">

<span class="text-xl font-bold text-primary">
Đại học Công nghệ Mở TPHCM
</span>

</div>
</header>

<main class="flex-grow flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white shadow-xl rounded-xl p-8">

<h1 class="text-2xl font-bold text-center mb-4">
Hệ thống Đăng ký Môn học
</h1>

<form id="loginForm" class="space-y-6">

<div>
<label class="block text-sm font-semibold mb-2">Tên đăng nhập</label>

<input id="username"
class="w-full border rounded-lg px-3 py-2"
placeholder="MSSV hoặc Email">
</div>

<div>
<label class="block text-sm font-semibold mb-2">Mật khẩu</label>

<input id="password"
type="password"
class="w-full border rounded-lg px-3 py-2"
placeholder="••••••••">
</div>

<button
class="w-full bg-primary text-white py-3 rounded-lg font-bold">
Đăng nhập
</button>

</form>

</div>

</main>

<!-- JS -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
