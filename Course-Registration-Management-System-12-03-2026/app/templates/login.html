<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Đăng nhập hệ thống</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}"
    />
  </head>

  <body class="bg-gray-100 min-h-screen flex flex-col font-[Inter]">
    <!-- HEADER -->
    <header class="w-full bg-white border-b">
      <div
        class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center"
      >
        <!-- LOGO -->
        <div class="flex items-center gap-3">
          <img
            src="{{ url_for('static', filename='images/logoOU.png') }}"
            class="h-10 w-10 object-contain"
            alt="logo"
          />

          <span class="font-semibold text-lg"> Đại học Mở </span>
        </div>

        <!-- SUPPORT -->
        <div class="flex gap-4 items-center text-sm">
          <a
            href="https://ou.edu.vn/author/support/"
            target="_blank"
            class="link-help"
          >
            Hỗ trợ
          </a>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="flex-grow flex items-center justify-center p-4">
      <div
        class="w-full max-w-md bg-white rounded-xl shadow-xl overflow-hidden"
      >
        <!-- BLUE HEADER WITH LOGO -->
        <div
          class="bg-gradient-to-r from-blue-700 via-blue-500 to-blue-400 py-10 flex justify-center"
        >
          <!-- SVG LOGO -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-10 h-10 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 3L2 9l10 6 10-6-10-6z"
            />

            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 11v4c0 2 3 3 6 3s6-1 6-3v-4"
            />
          </svg>
        </div>

        <!-- LOGIN BODY -->
        <div class="p-8">
          <h1 class="text-2xl font-bold text-center mb-2">
            Hệ thống Đăng ký Môn học
          </h1>

          <p class="text-center text-gray-500 mb-6 text-sm">
            Vui lòng đăng nhập bằng tài khoản sinh viên
          </p>

          <form id="loginForm" method="POST" class="space-y-5">
            <!-- USERNAME -->
            <div>
              <label class="block text-sm font-semibold mb-1">
                Tên đăng nhập
              </label>

              <input
                id="username"
                name="username"
                class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Mã số sinh viên"
              />
            </div>

            <!-- PASSWORD -->
            <div>
              <div class="flex justify-between text-sm mb-1">
                <label class="font-semibold"> Mật khẩu </label>

                <a
                  href="{{url_for('forgot_password')}}"
                  class="text-blue-600 hover:underline"
                >
                  Quên mật khẩu?
                </a>
              </div>

              <input
                id="password"
                name="password"
                type="password"
                class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="••••••••"
              />
            </div>

            <!-- REMEMBER -->
            <div class="flex items-center gap-2 text-sm">
              <input type="checkbox" name="remember" />

              <span>Ghi nhớ đăng nhập</span>
            </div>

            <!-- BUTTON -->
            <button
              type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
            >
              Đăng nhập
            </button>
          </form>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="text-center text-sm text-gray-500 mb-4">
      <p> 2024 Phòng Đào tạo - Đại học Mở</p>

      <p class="mt-1">Chính sách bảo mật • Điều khoản sử dụng</p>
    </footer>
  </body>
</html>
